<!DOCTYPE html>
<html lang="es">
<head>
    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Título -->
    <img src="trabajemosjuntos.png" class="titulo-trabajemosjuntos">

    <!-- Formulario -->
    <div class="container">
        <form>
            <label for="Name">Nombres</label>
            <input type="text" id="Name" placeholder="Ej Diego Emilio">

            <label for="Apellido">Apellidos</label>
            <input type="text" id="Apellido" placeholder="Ej Ponce Lopez">

            <label for="Mail">Email</label>
            <input type="email" id="Mail" placeholder="tu@email.com">

            <label for="Mensaje">Mensaje</label>
            <textarea id="Mensaje" placeholder="Escribe tu mensaje..."></textarea>

            <button type="submit">Enviar</button>
        </form>
    </div>
<footer>
    <a href="index.html">
        <img src="casa.png" class="inicio">
    </a>
</footer>
</body>

</html>
